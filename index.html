<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>بوفية شقف تبوك | نظام الطلبات المتكامل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tahoma', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff3e0 100%);
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        .hero-card {
            position: relative;
            border-radius: 40px;
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
        }

        .hero-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 20px 16px 16px;
            text-align: center;
        }

        .hero-overlay h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 800;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            background: #fff2e3;
            padding: 8px;
            border-radius: 60px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 6px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 50px;
            color: #b45f2b;
            cursor: pointer;
            transition: all 0.25s;
        }

        .tab-btn.active {
            background: #d97706;
            color: white;
            box-shadow: 0 4px 10px rgba(217,119,6,0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,215,170,0.6);
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            min-width: 120px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b45f2b;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 28px;
            border: 1.5px solid #ffddb0;
            background: #fffaf5;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(217,119,6,0.2);
        }

        button {
            background: #d97706;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: #b45f2b;
            transform: scale(0.97);
        }

        .btn-outline {
            background: #fff0e0;
            color: #b45f2b;
            border: 1px solid #f3c9a0;
        }

        .btn-danger {
            background: #e07c4c;
        }
        .btn-danger:hover {
            background: #c23d22;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 12px 6px;
            text-align: center;
            border-bottom: 1px solid #f2dbc4;
            font-size: 0.85rem;
        }

        th {
            background: #fbe9d8;
            color: #8b4c1c;
            font-weight: 800;
        }

        .badge {
            background: #fef3c7;
            color: #b45309;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .client-card {
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 24px;
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .flex-start {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        hr {
            margin: 15px 0;
            border-color: #ffe1bd;
        }

        .order-input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            background: rgba(255,245,235,0.7);
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 16px;
        }
        .order-item {
            flex: 1;
            min-width: 140px;
        }
        .order-item label {
            font-size: 0.75rem;
            font-weight: bold;
        }
        .inline-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .inline-group select, .inline-group input {
            flex: 2;
        }
        .extra-amount-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff0e6;
            padding: 4px 12px;
            border-radius: 60px;
        }
        .extra-amount-inline input {
            width: 90px;
            padding: 8px 10px;
            margin: 0;
        }
        .extra-amount-inline button {
            padding: 6px 14px;
            background: #2c7a4d;
        }
        @media (max-width: 550px) {
            body { padding: 12px; }
            th, td { font-size: 0.75rem; padding: 8px 4px; }
            .order-input-row { flex-direction: column; }
            .flex-between { flex-direction: column; align-items: stretch; }
            .extra-amount-inline { justify-content: space-between; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-card">
        <img src="https://img.freepik.com/premium-psd/sandwich-with-cup-coffee-cup-coffee_787500-23486.jpg" alt="بوفية شقف تبوك">
        <div class="hero-overlay">
            <h1>بوفية شقف تبوك</h1>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1">📋 قائمة الطعام</button>
        <button class="tab-btn" data-tab="tab2">👥 العملاء & الطلبات</button>
    </div>

    <!-- تبويب 1: قائمة الطعام -->
    <div id="tab1" class="tab-content active">
        <div class="card">
            <div class="form-row">
                <div class="input-group">
                    <label>🥪 اسم الساندويش</label>
                    <input type="text" id="sandwichName" placeholder="مثال: بيض وجبن">
                </div>
                <div class="input-group">
                    <label>💰 السعر (ريال)</label>
                    <input type="number" id="sandwichPrice" placeholder="السعر" step="0.5">
                </div>
                <button id="addSandwichBtn">➕ إضافة ساندويش</button>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>🥤 اسم المشروب</label>
                    <input type="text" id="drinkName" placeholder="مثال: عصير برتقال">
                </div>
                <div class="input-group">
                    <label>💰 السعر (ريال)</label>
                    <input type="number" id="drinkPrice" placeholder="السعر" step="0.5">
                </div>
                <button id="addDrinkBtn">🧃 إضافة مشروب</button>
            </div>
            <hr>
            <h3 style="color:#b45f2b;">📌 قائمة الأصناف</h3>
            <div style="overflow-x: auto;">
                <table id="menuTable">
                    <thead><tr><th>النوع</th><th>الاسم</th><th>السعر (ريال)</th><th>حذف</th></tr></thead>
                    <tbody id="menuList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- تبويب 2: العملاء والطلبات -->
    <div id="tab2" class="tab-content">
        <div class="card">
            <div class="flex-between">
                <h3>➕ إضافة عميل جديد</h3>
            </div>
            <div class="form-row">
                <div class="input-group" style="flex:3">
                    <label>👤 اسم العميل</label>
                    <input type="text" id="clientNameInput" placeholder="مثال: محمد السعيد">
                </div>
                <button id="addClientBtn">✨ إضافة عميل</button>
            </div>
            <hr>
            <div class="search-box">
                <input type="text" id="searchClientInput" placeholder="بحث بالحرف الأول والثاني ... مثال: مح" style="flex:2">
                <button id="searchBtn" class="btn-outline">🔍 بحث</button>
                <button id="resetSearchBtn" class="btn-outline">🔄 عرض الكل</button>
            </div>
            <hr>
            <h3>📋 قائمة العملاء وطلباتهم</h3>
            <div id="clientsContainer"></div>
        </div>
    </div>
</div>

<script>
    // ------------------- البيانات -------------------
    let menuItems = [];   
    let clients = [];     

    let nextItemId = 1;
    let nextClientId = 1;
    let nextOrderId = 1;

    const STORAGE_MENU = "bofiya_menu_items";
    const STORAGE_CLIENTS = "bofiya_clients";
    const STORAGE_IDS = "bofiya_ids";

    function saveAllData() {
        localStorage.setItem(STORAGE_MENU, JSON.stringify(menuItems));
        localStorage.setItem(STORAGE_CLIENTS, JSON.stringify(clients));
        localStorage.setItem(STORAGE_IDS, JSON.stringify({ nextItemId, nextClientId, nextOrderId }));
    }

    function loadAllData() {
        const savedMenu = localStorage.getItem(STORAGE_MENU);
        const savedClients = localStorage.getItem(STORAGE_CLIENTS);
        const savedIds = localStorage.getItem(STORAGE_IDS);
        
        if(savedMenu) {
            menuItems = JSON.parse(savedMenu);
            if(menuItems.length) nextItemId = Math.max(...menuItems.map(i=>i.id), 0) + 1;
        } else {
            menuItems = [
                { id: nextItemId++, type: 'sandwich', name: 'بيض وجبن', price: 8.5 },
                { id: nextItemId++, type: 'sandwich', name: 'فلافل', price: 6 },
                { id: nextItemId++, type: 'drink', name: 'عصير برتقال', price: 7 },
                { id: nextItemId++, type: 'drink', name: 'مياه صغيرة', price: 2 }
            ];
        }
        
        if(savedClients) {
            clients = JSON.parse(savedClients);
            if(clients.length) {
                nextClientId = Math.max(...clients.map(c=>c.id), 0) + 1;
                let allOrdersId = [];
                clients.forEach(c => c.orders.forEach(o => allOrdersId.push(o.orderId)));
                if(allOrdersId.length) nextOrderId = Math.max(...allOrdersId, 0) + 1;
            }
        } else {
            const nowDate = getArabicDateTime();
            clients = [
                { id: nextClientId++, name: 'محمد السعيد', orders: [] },
                { id: nextClientId++, name: 'محمود حسن', orders: [] }
            ];
            clients[0].orders.push({ orderId: nextOrderId++, type: 'meal', sandwichId:1, sandwichName:'بيض وجبن', sandwichQty:2, drinkId:3, drinkName:'عصير برتقال', drinkQty:1, totalPrice: 8.5*2+7, timestamp: nowDate, rawDate: new Date().toISOString() });
            clients[1].orders.push({ orderId: nextOrderId++, type: 'meal', sandwichId:2, sandwichName:'فلافل', sandwichQty:1, drinkId:4, drinkName:'مياه صغيرة', drinkQty:2, totalPrice: 6+4, timestamp: getArabicDateTime(), rawDate: new Date().toISOString() });
        }
        if(savedIds) {
            const ids = JSON.parse(savedIds);
            nextItemId = ids.nextItemId;
            nextClientId = ids.nextClientId;
            nextOrderId = ids.nextOrderId;
        }
        renderMenuTable();
        renderFilteredClients(); 
    }

    function getArabicDateTime() {
        const now = new Date();
        const optionsDate = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        let dateStr = now.toLocaleDateString('ar-SA', optionsDate);
        let hours = now.getHours();
        let minutes = now.getMinutes().toString().padStart(2,'0');
        let ampm = hours >= 12 ? 'م' : 'ص';
        let hour12 = hours % 12 || 12;
        let timeStr = `${hour12}:${minutes} ${ampm}`;
        return `${dateStr} - ${timeStr}`;
    }

    function renderMenuTable() {
        const tbody = document.getElementById('menuList');
        if(!tbody) return;
        tbody.innerHTML = '';
        menuItems.forEach(item => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = item.type === 'sandwich' ? '🥪 ساندويش' : '🥤 مشروب';
            row.insertCell(1).innerText = item.name;
            row.insertCell(2).innerText = item.price.toFixed(2);
            const delCell = row.insertCell(3);
            const delBtn = document.createElement('button');
            delBtn.innerText = '🗑 حذف';
            delBtn.className = 'btn-danger';
            delBtn.style.padding = '6px 12px';
            delBtn.style.fontSize = '0.7rem';
            delBtn.onclick = () => {
                menuItems = menuItems.filter(i => i.id !== item.id);
                renderMenuTable();
                renderFilteredClients(); 
                saveAllData();
            };
            delCell.appendChild(delBtn);
        });
        if(menuItems.length === 0) tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">⚠️ لا توجد أصناف، أضف ساندويش أو مشروب أولاً</td></tr>';
        saveAllData();
    }

    function addSandwich() {
        const name = document.getElementById('sandwichName').value.trim();
        const price = parseFloat(document.getElementById('sandwichPrice').value);
        if(!name || isNaN(price) || price <= 0) { alert('يرجى إدخال اسم ساندويش وسعر صحيح'); return; }
        menuItems.push({ id: nextItemId++, type: 'sandwich', name, price });
        document.getElementById('sandwichName').value = '';
        document.getElementById('sandwichPrice').value = '';
        renderMenuTable();
        renderFilteredClients();
        saveAllData();
    }

    function addDrink() {
        const name = document.getElementById('drinkName').value.trim();
        const price = parseFloat(document.getElementById('drinkPrice').value);
        if(!name || isNaN(price) || price <= 0) { alert('يرجى إدخال اسم مشروب وسعر صحيح'); return; }
        menuItems.push({ id: nextItemId++, type: 'drink', name, price });
        document.getElementById('drinkName').value = '';
        document.getElementById('drinkPrice').value = '';
        renderMenuTable();
        renderFilteredClients();
        saveAllData();
    }

    function addClient() {
        const name = document.getElementById('clientNameInput').value.trim();
        if(!name) { alert('أدخل اسم العميل'); return; }
        if(clients.some(c => c.name === name)) { alert('هذا العميل موجود مسبقاً'); return; }
        clients.push({ id: nextClientId++, name, orders: [] });
        document.getElementById('clientNameInput').value = '';
        renderFilteredClients();
        saveAllData();
    }

    function deleteClient(clientId) {
        clients = clients.filter(c => c.id !== clientId);
        renderFilteredClients();
        saveAllData();
    }

    // إضافة طلب عادي (ساندويش/مشروب)
    function addOrderToClient(clientId, sandwichId, sandwichQty, drinkId, drinkQty) {
        const client = clients.find(c => c.id === clientId);
        if(!client) return;
        const sandwichItem = menuItems.find(i => i.id === parseInt(sandwichId) && i.type === 'sandwich');
        const drinkItem = menuItems.find(i => i.id === parseInt(drinkId) && i.type === 'drink');
        if(!sandwichItem && !drinkItem) { alert('يجب اختيار ساندويش أو مشروب على الأقل'); return; }
        let total = 0;
        let details = [];
        if(sandwichItem && sandwichQty > 0) { total += sandwichItem.price * sandwichQty; details.push(`${sandwichItem.name} (${sandwichQty})`); }
        else if(sandwichItem && sandwichQty <= 0) { alert('عدد الساندويشات يجب أن يكون أكبر من صفر'); return; }
        if(drinkItem && drinkQty > 0) { total += drinkItem.price * drinkQty; details.push(`${drinkItem.name} (${drinkQty})`); }
        else if(drinkItem && drinkQty <= 0) { alert('عدد المشروبات يجب أن يكون أكبر من صفر'); return; }
        
        const timestamp = getArabicDateTime();
        const newOrder = {
            orderId: nextOrderId++,
            type: 'meal',
            sandwichId: sandwichItem ? sandwichItem.id : null,
            sandwichName: sandwichItem ? sandwichItem.name : null,
            sandwichQty: sandwichItem ? sandwichQty : 0,
            drinkId: drinkItem ? drinkItem.id : null,
            drinkName: drinkItem ? drinkItem.name : null,
            drinkQty: drinkItem ? drinkQty : 0,
            totalPrice: total,
            description: details.join(' + '),
            timestamp: timestamp,
            rawDate: new Date().toISOString()
        };
        client.orders.push(newOrder);
        renderFilteredClients();
        saveAllData();
    }

    // إضافة مبلغ مباشر (مصغر وبجانب زر الحذف)
    function addExtraAmount(clientId, amount) {
        const client = clients.find(c => c.id === clientId);
        if(!client) return;
        if(isNaN(amount) || amount <= 0) { alert('الرجاء إدخال مبلغ صحيح أكبر من صفر'); return false; }
        const timestamp = getArabicDateTime();
        const extraOrder = {
            orderId: nextOrderId++,
            type: 'extra',
            totalPrice: amount,
            description: `💵 مبلغ إضافي: ${amount} ريال`,
            timestamp: timestamp,
            rawDate: new Date().toISOString()
        };
        client.orders.push(extraOrder);
        renderFilteredClients();
        saveAllData();
        return true;
    }

    function deleteOrderFromClient(clientId, orderId) {
        const client = clients.find(c => c.id === clientId);
        if(client) {
            client.orders = client.orders.filter(o => o.orderId !== orderId);
            renderFilteredClients();
            saveAllData();
        }
    }

    function getClientTotal(client) {
        return client.orders.reduce((sum, order) => sum + order.totalPrice, 0);
    }

    let currentFilter = "";
    function renderFilteredClients() {
        const container = document.getElementById('clientsContainer');
        if(!container) return;
        let filtered = [...clients];
        if(currentFilter.trim() !== "") filtered = clients.filter(c => c.name.startsWith(currentFilter.trim()));
        if(filtered.length === 0) {
            container.innerHTML = '<div class="card" style="text-align:center">👈 لا يوجد عملاء تطابق البحث، أضف عميلاً جديداً</div>';
            return;
        }
        container.innerHTML = '';
        const pastelColors = ["#FFF2E6", "#E6F7F0", "#FEE9E6", "#E8ECFC", "#FFF0DB", "#E3F2F5", "#FDEBD2", "#EAE6F9", "#FFEFE0", "#DCF5EA"];
        
        filtered.forEach((client, idx) => {
            const bgColor = pastelColors[idx % pastelColors.length];
            const totalSpent = getClientTotal(client);
            const sandwiches = menuItems.filter(i => i.type === 'sandwich');
            const drinks = menuItems.filter(i => i.type === 'drink');
            
            const clientDiv = document.createElement('div');
            clientDiv.className = 'client-card';
            clientDiv.style.backgroundColor = bgColor;
            clientDiv.style.border = "1px solid rgba(0,0,0,0.03)";
            clientDiv.innerHTML = `
                <div class="flex-between" style="margin-bottom:12px;">
                    <div class="flex-start">
                        <h3 style="color:#b45f2b;">👤 ${client.name}</h3>
                        <span class="badge" style="background:#d97706; color:white;">💰 الإجمالي: ${totalSpent.toFixed(2)} ريال</span>
                    </div>
                    <div class="flex-start">
                        <!-- حقل إضافة مبلغ مصغر بجانب زر الحذف -->
                        <div class="extra-amount-inline">
                            <input type="number" id="extraAmount_${client.id}" placeholder="المبلغ" step="0.5" style="width:85px;">
                            <button id="addExtraBtn_${client.id}" style="background:#2c7a4d; padding:6px 12px;">➕ إضافة مبلغ</button>
                        </div>
                        <button class="btn-danger btn-small" data-clientid="${client.id}" id="delClient_${client.id}">🗑 حذف العميل</button>
                    </div>
                </div>
                <!-- طلب عادي من القائمة -->
                <div style="background:rgba(255,245,235,0.8); border-radius:28px; padding:12px; margin-bottom:14px;">
                    <div class="order-input-row">
                        <div class="order-item">
                            <label>🥪 الساندويش</label>
                            <div class="inline-group">
                                <select id="sandSelect_${client.id}" style="flex:2;">
                                    <option value="">-- اختر --</option>
                                    ${sandwiches.map(s => `<option value="${s.id}">${s.name} (${s.price} ريال)</option>`).join('')}
                                </select>
                                <input type="number" id="sandQty_${client.id}" value="1" min="0" step="1" style="width:75px;" placeholder="عدد">
                            </div>
                        </div>
                        <div class="order-item">
                            <label>🥤 المشروب</label>
                            <div class="inline-group">
                                <select id="drinkSelect_${client.id}" style="flex:2;">
                                    <option value="">-- اختر --</option>
                                    ${drinks.map(d => `<option value="${d.id}">${d.name} (${d.price} ريال)</option>`).join('')}
                                </select>
                                <input type="number" id="drinkQty_${client.id}" value="1" min="0" step="1" style="width:75px;" placeholder="عدد">
                            </div>
                        </div>
                        <button id="addOrderBtn_${client.id}" style="align-self:flex-end;">➕ إضافة طلب</button>
                    </div>
                </div>
                <h4>📜 سجل الطلبات (يشمل المبالغ المضافة)</h4>
                <div style="overflow-x:auto;">
                    <table width="100%">
                        <thead><tr><th>الوصف</th><th>المبلغ (ريال)</th><th>التاريخ والوقت</th><th>حذف</th></tr></thead>
                        <tbody id="ordersBody_${client.id}"></tbody>
                    </table>
                </div>
            `;
            container.appendChild(clientDiv);
            
            document.getElementById(`delClient_${client.id}`).addEventListener('click', () => deleteClient(client.id));
            // إضافة مبلغ مباشر
            document.getElementById(`addExtraBtn_${client.id}`).addEventListener('click', () => {
                const amountInput = document.getElementById(`extraAmount_${client.id}`);
                const amount = parseFloat(amountInput.value);
                if(!isNaN(amount) && amount > 0) {
                    addExtraAmount(client.id, amount);
                    amountInput.value = '';
                } else {
                    alert('يرجى إدخال مبلغ صحيح أكبر من صفر');
                }
            });
            // إضافة طلب من القائمة
            document.getElementById(`addOrderBtn_${client.id}`).addEventListener('click', () => {
                const sandVal = document.getElementById(`sandSelect_${client.id}`).value;
                const sandQty = parseInt(document.getElementById(`sandQty_${client.id}`).value) || 0;
                const drinkVal = document.getElementById(`drinkSelect_${client.id}`).value;
                const drinkQty = parseInt(document.getElementById(`drinkQty_${client.id}`).value) || 0;
                if((!sandVal || sandQty<=0) && (!drinkVal || drinkQty<=0)) {
                    alert('يرجى اختيار ساندويش أو مشروب مع عدد صحيح أكبر من 0');
                    return;
                }
                addOrderToClient(client.id, sandVal || null, sandVal ? sandQty : 0, drinkVal || null, drinkVal ? drinkQty : 0);
            });
            
            const tbodyOrders = document.getElementById(`ordersBody_${client.id}`);
            if(client.orders.length === 0) {
                tbodyOrders.innerHTML = '<tr><td colspan="4" style="text-align:center">لا توجد طلبات بعد</td></tr>';
            } else {
                client.orders.slice().sort((a,b)=> (a.rawDate || '').localeCompare(b.rawDate || '')).forEach(order => {
                    const row = tbodyOrders.insertRow();
                    let descText = '';
                    if(order.type === 'extra') {
                        descText = order.description;
                    } else {
                        let items = [];
                        if(order.sandwichName) items.push(`${order.sandwichName} (${order.sandwichQty})`);
                        if(order.drinkName) items.push(`${order.drinkName} (${order.drinkQty})`);
                        descText = items.join(' + ');
                    }
                    row.insertCell(0).innerText = descText;
                    row.insertCell(1).innerHTML = `<strong>${order.totalPrice.toFixed(2)}</strong>`;
                    row.insertCell(2).innerText = order.timestamp;
                    const delOrderBtn = document.createElement('button');
                    delOrderBtn.innerText = '🗑';
                    delOrderBtn.style.background = '#e07c4c';
                    delOrderBtn.style.padding = '4px 12px';
                    delOrderBtn.onclick = () => deleteOrderFromClient(client.id, order.orderId);
                    const cell = row.insertCell(3);
                    cell.appendChild(delOrderBtn);
                });
            }
        });
    }

    function handleSearch() {
        currentFilter = document.getElementById('searchClientInput').value.trim();
        renderFilteredClients();
    }
    function resetSearch() {
        document.getElementById('searchClientInput').value = '';
        currentFilter = '';
        renderFilteredClients();
    }

    document.getElementById('addSandwichBtn')?.addEventListener('click', addSandwich);
    document.getElementById('addDrinkBtn')?.addEventListener('click', addDrink);
    document.getElementById('addClientBtn')?.addEventListener('click', addClient);
    document.getElementById('searchBtn')?.addEventListener('click', handleSearch);
    document.getElementById('resetSearchBtn')?.addEventListener('click', resetSearch);
    
    const tabsBtns = document.querySelectorAll('.tab-btn');
    const tabsContents = document.querySelectorAll('.tab-content');
    tabsBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            tabsBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tabsContents.forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab2') renderFilteredClients();
        });
    });

    loadAllData();
</script>
</body>
</html>
